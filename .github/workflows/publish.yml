name: 'Publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

# ensure only one release workflow runs at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # first job: generate changelog and create the release
  prepare-release:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      release_id: ${{ steps.create_release.outputs.id }}
      release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0  # Need full history for changelog

      - name: Verify release version
        id: get_version
        run: |
          set -euo pipefail

          PACKAGE_VERSION=$(jq -r '.version' package.json)
          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' src-tauri/Cargo.toml)

          echo "package.json: $PACKAGE_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ] || [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch across package.json, tauri.conf.json, and Cargo.toml"
            exit 1
          fi

          VERSION="$PACKAGE_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Get previous GitHub release tag
        id: get_prev_tag
        run: |
          # Get the most recent tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $PREV_TAG"

      - name: Generate release changelog
        id: changelog
        env:
          PREV_TAG: ${{ steps.get_prev_tag.outputs.prev_tag }}
        run: |
          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi

          # Categorize commits by conventional commit type
          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS= read -r line; do
            if [[ "$line" == *"feat:"* ]] || [[ "$line" == *"feat("* ]]; then
              FEATURES="${FEATURES}${line}"$'\n'
            elif [[ "$line" == *"fix:"* ]] || [[ "$line" == *"fix("* ]]; then
              FIXES="${FIXES}${line}"$'\n'
            elif [[ -n "$line" ]]; then
              OTHERS="${OTHERS}${line}"$'\n'
            fi
          done <<< "$COMMITS"

          # Build changelog with proper newlines
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## ✨ Features"$'\n\n'"${FEATURES}"$'\n'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes"$'\n\n'"${FIXES}"$'\n'
          fi

          if [ -n "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}## 📝 Other Changes"$'\n\n'"${OTHERS}"$'\n'
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No notable changes in this release."
          fi

          # Add download instructions with platform-specific links
          REPO="${{ github.repository }}"
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v${VERSION}"

          CHANGELOG="${CHANGELOG}---"$'\n\n'"## 📥 Downloads"$'\n\n'
          CHANGELOG="${CHANGELOG}### Windows"$'\n'
          CHANGELOG="${CHANGELOG}- [x64 Installer (.msi)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_x64_en-US.msi)"$'\n'
          CHANGELOG="${CHANGELOG}- [ARM64 Installer (.msi)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_arm64_en-US.msi)"$'\n\n'
          CHANGELOG="${CHANGELOG}- [x64 Portable Installer (.exe)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_x64-setup.exe)"$'\n'
          CHANGELOG="${CHANGELOG}- [ARM64 Portable Installer (.exe)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_arm64-setup.exe)"$'\n'
          CHANGELOG="${CHANGELOG}### macOS"$'\n'
          CHANGELOG="${CHANGELOG}- [Apple Silicon (.dmg)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_aarch64.dmg)"$'\n'
          CHANGELOG="${CHANGELOG}- [Intel (.dmg)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_x64.dmg)"$'\n\n'
          CHANGELOG="${CHANGELOG}### Linux"$'\n'
          CHANGELOG="${CHANGELOG}- [Debian/Ubuntu x86_64 (.deb)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_amd64.deb)"$'\n'
          CHANGELOG="${CHANGELOG}- [Debian/Ubuntu ARM64 (.deb)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_arm64.deb)"$'\n'
          CHANGELOG="${CHANGELOG}- [Fedora/RHEL x86_64 (.rpm)](https://github.com/${REPO}/releases/download/${TAG}/Chiri-${VERSION}-1.x86_64.rpm)"$'\n'
          CHANGELOG="${CHANGELOG}- [Fedora/RHEL ARM64 (.rpm)](https://github.com/${REPO}/releases/download/${TAG}/Chiri-${VERSION}-1.aarch64.rpm)"$'\n'
          CHANGELOG="${CHANGELOG}- [AppImage (x86_64)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_amd64.AppImage)"$'\n'
          CHANGELOG="${CHANGELOG}- [AppImage (ARM64)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_aarch64.AppImage)"

          # Use heredoc syntax for multiline output
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
          RELEASE_BODY: ${{ steps.changelog.outputs.changelog }}
        run: |
          set -euo pipefail

          TAG="app-v${VERSION}"
          RELEASE_NAME="Chiri v${VERSION}"

          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases" > releases.json
          RELEASE_ID=$(jq -r --arg tag "$TAG" '[.[][] | select(.tag_name == $tag)][0].id // empty' releases.json)

          if [ -n "$RELEASE_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" > release.json

            if [ "$(jq -r '.draft' release.json)" != "true" ]; then
              echo "::error::Release $TAG already exists and is not a draft"
              exit 1
            fi

            jq -n \
              --arg name "$RELEASE_NAME" \
              --arg body "$RELEASE_BODY" \
              '{name: $name, body: $body, draft: true, prerelease: false}' \
              > release-payload.json

            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              --input release-payload.json \
              > release.json
          else
            jq -n \
              --arg tag "$TAG" \
              --arg name "$RELEASE_NAME" \
              --arg body "$RELEASE_BODY" \
              --arg target "$GITHUB_SHA" \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $name,
                body: $body,
                draft: true,
                prerelease: false
              }' \
              > release-payload.json

            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/releases" \
              --input release-payload.json \
              > release.json
          fi

          RELEASE_ID=$(jq -r '.id // empty' release.json)
          RELEASE_URL=$(jq -r '.html_url // empty' release.json)

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::GitHub release ID was empty"
            exit 1
          fi

          jq -e --arg tag "$TAG" '
            .tag_name == $tag and
            .draft == true and
            .prerelease == false
          ' release.json > /dev/null

          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "Draft release ready: $TAG ($RELEASE_ID)"

  # second job: Build and upload artifacts for each platform
  publish-tauri:
    name: ${{ matrix.label }}
    needs: prepare-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-26'
            label: 'macOS (Apple Silicon)'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-26-intel'
            label: 'macOS (Intel)'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            label: 'Ubuntu'
            args: '--bundles deb,rpm'
          - platform: 'ubuntu-22.04-arm'
            label: 'Ubuntu (ARM)'
            args: '--bundles deb,rpm'
          - platform: 'windows-latest'
            label: 'Windows'
            args: ''
          - platform: 'windows-11-arm'
            label: 'Windows (ARM)'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Tauri build
        uses: ./.github/actions/setup-tauri-build
        with:
          platform: ${{ matrix.platform }}
          rust-targets: ${{ matrix.platform == 'macos-26' && 'aarch64-apple-darwin' || '' }}

      - name: Show Apple toolchain
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          xcrun --sdk macosx --show-sdk-path

      - name: Load signing secrets from 1Password
        if: matrix.platform != 'windows-11-arm'
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4
        with:
          export-env: true
          version: 2.33.1
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: op://GitHub Actions/Tauri Secrets/signing-key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: op://GitHub Actions/Tauri Secrets/signing-key-password
          APPLE_SIGNING_IDENTITY: op://GitHub Actions/Apple Secrets/identity
          APPLE_CERTIFICATE: op://GitHub Actions/Apple Secrets/certificate
          APPLE_CERTIFICATE_PASSWORD: op://GitHub Actions/Apple Secrets/api-key
          APPLE_API_ISSUER: op://GitHub Actions/Apple Secrets/api-issuer
          APPLE_API_KEY: op://GitHub Actions/Apple Secrets/api-key
          APPLE_API_KEY_CERTIFICATE: op://GitHub Actions/Apple Secrets/api-key-certificate

      - name: Load signing secrets from 1Password [Windows ARM]
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          # Install 1Password CLI manually for Windows ARM (not officially supported)
          $opUrl = "https://cache.agilebits.com/dist/1P/op2/pkg/v2.33.1/op_windows_amd64_v2.33.1.zip"
          Invoke-WebRequest -Uri $opUrl -OutFile "$env:RUNNER_TEMP\op.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\op.zip" -DestinationPath "$env:RUNNER_TEMP\op"
          $env:PATH = "$env:RUNNER_TEMP\op;$env:PATH"

          # Load secrets
          $signingKey = op read "op://GitHub Actions/Tauri Secrets/signing-key"
          $signingKeyPassword = op read "op://GitHub Actions/Tauri Secrets/signing-key-password"

          # Export to GitHub environment
          "TAURI_SIGNING_PRIVATE_KEY=$signingKey" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$signingKeyPassword" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import Apple signing certificate [macOS]
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Extract signing identity from certificate
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID" | head -1 | awk -F'"' '{print $2}')
          echo "Found signing identity: $CERT_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Prepare Apple API key for signing [macOS]
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          APPLE_KEY_FILE="$RUNNER_TEMP/apple_api_key.p8"
          printf '%s' "$APPLE_API_KEY_CERTIFICATE" > "$APPLE_KEY_FILE"
          chmod 600 "$APPLE_KEY_FILE"
          echo "APPLE_API_KEY_PATH=$APPLE_KEY_FILE" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          # use existing release created by prepare-release job
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: app-v${{ needs.prepare-release.outputs.version }}
          args: ${{ matrix.args }}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: 'src-tauri/target/**/release/bundle/**/*.{dmg,deb,rpm,exe,msi,zip,tar.gz,sig}'

  publish-appimage:
    name: ${{ matrix.label }}
    needs: prepare-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            label: 'AppImage (x86_64)'
          - platform: 'ubuntu-24.04-arm'
            label: 'AppImage (ARM64)'

    runs-on: ${{ matrix.platform }}
    container: ghcr.io/pkgforge-dev/archlinux@sha256:f6fc7e14b0612a355d7ab50efb3cc40010ba28e4766860bd238d313b308f190b
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup portable AppImage build
        uses: ./.github/actions/setup-portable-appimage

      - name: Load signing secrets from 1Password
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4
        with:
          export-env: true
          version: 2.33.1
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: op://GitHub Actions/Tauri Secrets/signing-key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: op://GitHub Actions/Tauri Secrets/signing-key-password

      - name: Build and publish portable AppImage
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: app-v${{ needs.prepare-release.outputs.version }}
          args: --bundles appimage

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: 'src-tauri/target/**/release/bundle/**/*.AppImage*'

  publish-summary:
    name: Publish summary
    needs:
      - prepare-release
      - publish-tauri
      - publish-appimage
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write publish summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: app-v${{ needs.prepare-release.outputs.version }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_URL: ${{ needs.prepare-release.outputs.release_url }}
          BUILD_RESULT: ${{ needs.publish-tauri.result }}
          APPIMAGE_BUILD_RESULT: ${{ needs.publish-appimage.result }}
        run: |
          set -euo pipefail

          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets,url \
            > release.json

          ASSET_COUNT=$(jq '.assets | length' release.json)
          RELEASE_URL="${RELEASE_URL:-$(jq -r '.url // ""' release.json)}"

          mkdir -p release-assets
          if gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir release-assets \
            --clobber >/dev/null 2>&1; then
            UPDATER_PLATFORM_COUNT=$(jq '.platforms | length' release-assets/latest.json)
          else
            UPDATER_PLATFORM_COUNT="unavailable"
          fi

          {
            echo "## Publish"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`$VERSION\` |"
            echo "| Release | [$TAG]($RELEASE_URL) |"
            echo "| Build result | $BUILD_RESULT |"
            echo "| AppImage result | $APPIMAGE_BUILD_RESULT |"
            echo "| Asset count | $ASSET_COUNT |"
            echo "| Updater platform count | $UPDATER_PLATFORM_COUNT |"
            echo "| Hash update status | Pending post-release |"
          } >> "$GITHUB_STEP_SUMMARY"
