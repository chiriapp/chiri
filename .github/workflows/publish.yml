name: 'Publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

# ensure only one release workflow runs at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # first job: generate changelog and create the release
  prepare-release:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Verify release version
        id: get_version
        run: |
          set -euo pipefail

          PACKAGE_VERSION=$(jq -r '.version' package.json)
          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' src-tauri/Cargo.toml)

          echo "package.json: $PACKAGE_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ] || [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch across package.json, tauri.conf.json, and Cargo.toml"
            exit 1
          fi

          VERSION="$PACKAGE_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Get previous GitHub release tag
        id: get_prev_tag
        run: |
          # Get the most recent tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $PREV_TAG"

      - name: Generate release changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.get_prev_tag.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD)
          fi

          # Categorize commits by conventional commit type
          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS= read -r line; do
            if [[ "$line" == *"feat:"* ]] || [[ "$line" == *"feat("* ]]; then
              FEATURES="${FEATURES}${line}"$'\n'
            elif [[ "$line" == *"fix:"* ]] || [[ "$line" == *"fix("* ]]; then
              FIXES="${FIXES}${line}"$'\n'
            elif [[ -n "$line" ]]; then
              OTHERS="${OTHERS}${line}"$'\n'
            fi
          done <<< "$COMMITS"

          # Build changelog with proper newlines
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## ✨ Features"$'\n\n'"${FEATURES}"$'\n'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes"$'\n\n'"${FIXES}"$'\n'
          fi

          if [ -n "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}## 📝 Other Changes"$'\n\n'"${OTHERS}"$'\n'
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No notable changes in this release."
          fi

          # Add download instructions with platform-specific links
          REPO="${{ github.repository }}"
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v${VERSION}"

          CHANGELOG="${CHANGELOG}---"$'\n\n'"## 📥 Downloads"$'\n\n'
          CHANGELOG="${CHANGELOG}### Windows"$'\n'
          CHANGELOG="${CHANGELOG}- [x64 Installer (.exe)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_x64-setup.exe)"$'\n'
          CHANGELOG="${CHANGELOG}- [ARM64 Installer (.exe)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_arm64-setup.exe)"$'\n'
          CHANGELOG="${CHANGELOG}- [x64 Installer (.msi)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_x64_en-US.msi)"$'\n'
          CHANGELOG="${CHANGELOG}- [ARM64 Installer (.msi)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_arm64_en-US.msi)"$'\n\n'
          CHANGELOG="${CHANGELOG}### macOS"$'\n'
          CHANGELOG="${CHANGELOG}- [Apple Silicon](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_aarch64.dmg)"$'\n'
          CHANGELOG="${CHANGELOG}- [Intel](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_x64.dmg)"$'\n\n'
          CHANGELOG="${CHANGELOG}### Linux"$'\n'
          CHANGELOG="${CHANGELOG}- [Debian/Ubuntu x86_64 (.deb)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_amd64.deb)"$'\n'
          CHANGELOG="${CHANGELOG}- [Debian/Ubuntu ARM64 (.deb)](https://github.com/${REPO}/releases/download/${TAG}/Chiri_${VERSION}_arm64.deb)"$'\n'
          CHANGELOG="${CHANGELOG}- [Fedora/RHEL x86_64 (.rpm)](https://github.com/${REPO}/releases/download/${TAG}/Chiri-${VERSION}-1.x86_64.rpm)"$'\n'
          CHANGELOG="${CHANGELOG}- [Fedora/RHEL ARM64 (.rpm)](https://github.com/${REPO}/releases/download/${TAG}/Chiri-${VERSION}-1.aarch64.rpm)"

          # Use heredoc syntax for multiline output
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: app-v${{ steps.get_version.outputs.version }}
          release_name: Chiri v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: true
          prerelease: false

  # second job: Build and upload artifacts for each platform
  publish-tauri:
    name: ${{ matrix.label }}
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            label: 'macOS (Apple Silicon)'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15-intel'
            label: 'macOS (Intel)'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            label: 'Ubuntu'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            label: 'Ubuntu (ARM)'
            args: ''
          - platform: 'windows-latest'
            label: 'Windows'
            args: ''
          - platform: 'windows-11-arm'
            label: 'Windows (ARM)'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies [Ubuntu]
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Load signing secrets from 1Password
        if: matrix.platform != 'windows-11-arm'
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: op://Tauri/Tauri Secrets/signing-key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: op://Tauri/Tauri Secrets/signing-key-password
          APPLE_SIGNING_IDENTITY: op://Tauri/Apple Secrets/identity
          APPLE_CERTIFICATE: op://Tauri/Apple Secrets/certificate
          APPLE_CERTIFICATE_PASSWORD: op://Tauri/Apple Secrets/api-key
          APPLE_API_ISSUER: op://Tauri/Apple Secrets/api-issuer
          APPLE_API_KEY: op://Tauri/Apple Secrets/api-key
          APPLE_API_KEY_CERTIFICATE: op://Tauri/Apple Secrets/api-key-certificate

      - name: Load signing secrets from 1Password [Windows ARM]
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          # Install 1Password CLI manually for Windows ARM (not officially supported)
          $opUrl = "https://cache.agilebits.com/dist/1P/op2/pkg/v2.33.1/op_windows_amd64_v2.33.1.zip"
          Invoke-WebRequest -Uri $opUrl -OutFile "$env:RUNNER_TEMP\op.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\op.zip" -DestinationPath "$env:RUNNER_TEMP\op"
          $env:PATH = "$env:RUNNER_TEMP\op;$env:PATH"

          # Load secrets
          $signingKey = op read "op://Tauri/Tauri Secrets/signing-key"
          $signingKeyPassword = op read "op://Tauri/Tauri Secrets/signing-key-password"

          # Export to GitHub environment
          "TAURI_SIGNING_PRIVATE_KEY=$signingKey" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$signingKeyPassword" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import Apple signing certificate [macOS]
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-15-intel'
        shell: bash
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Extract signing identity from certificate
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID" | head -1 | awk -F'"' '{print $2}')
          echo "Found signing identity: $CERT_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Prepare Apple API key for signing [macOS]
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-15-intel'
        shell: bash
        run: |
          APPLE_KEY_FILE="$RUNNER_TEMP/apple_api_key.p8"
          printf '%s' "$APPLE_API_KEY_CERTIFICATE" > "$APPLE_KEY_FILE"
          chmod 600 "$APPLE_KEY_FILE"
          echo "APPLE_API_KEY_PATH=$APPLE_KEY_FILE" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          # use existing release created by prepare-release job
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          args: ${{ matrix.args }}
