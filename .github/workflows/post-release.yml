name: 'Post-release'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to process, for example app-v0.9.0. Defaults to master package version.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: post-release-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  version-metadata:
    name: Version metadata
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'app-v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag || 'master' }}

      - name: Verify version fields
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION=$(jq -r '.version' package.json)
          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' src-tauri/Cargo.toml)

          echo "package.json: $PACKAGE_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ] || [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch across package.json, tauri.conf.json, and Cargo.toml"
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="app-v$PACKAGE_VERSION"
          fi

          VERSION="${TAG#app-v}"
          if [ "$VERSION" = "$TAG" ]; then
            echo "::error::Release tag must use the app-v prefix"
            exit 1
          fi

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag $TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  finalize:
    name: Finalize
    needs: version-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: master
          fetch-depth: 1

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cache-name: ${{ vars.CACHIX_CACHE_NAME || 'chiri' }}
          auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Verify expected release assets
        id: release_assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version-metadata.outputs.tag }}
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets,url \
            > release.json

          jq -r '.assets[].name' release.json > assets.txt
          cat assets.txt

          RELEASE_URL=$(jq -r '.url // empty' release.json)
          ASSET_COUNT=$(jq '.assets | length' release.json)
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "asset_count=$ASSET_COUNT" >> "$GITHUB_OUTPUT"

          expected_assets=(
            "latest.json"
            "Chiri_${VERSION}_x64-setup.exe"
            "Chiri_${VERSION}_x64-setup.exe.sig"
            "Chiri_${VERSION}_arm64-setup.exe"
            "Chiri_${VERSION}_arm64-setup.exe.sig"
            "Chiri_${VERSION}_x64_en-US.msi"
            "Chiri_${VERSION}_x64_en-US.msi.sig"
            "Chiri_${VERSION}_arm64_en-US.msi"
            "Chiri_${VERSION}_arm64_en-US.msi.sig"
            "Chiri_${VERSION}_aarch64.dmg"
            "Chiri_${VERSION}_x64.dmg"
            "Chiri_${VERSION}_amd64.deb"
            "Chiri_${VERSION}_amd64.deb.sig"
            "Chiri_${VERSION}_arm64.deb"
            "Chiri_${VERSION}_arm64.deb.sig"
            "Chiri-${VERSION}-1.x86_64.rpm"
            "Chiri-${VERSION}-1.x86_64.rpm.sig"
            "Chiri-${VERSION}-1.aarch64.rpm"
            "Chiri-${VERSION}-1.aarch64.rpm.sig"
            "garden.chiri.Chiri_${VERSION}_aarch64.AppImage"
            "garden.chiri.Chiri_${VERSION}_aarch64.AppImage.sig"
            "garden.chiri.Chiri_${VERSION}_amd64.AppImage"
            "garden.chiri.Chiri_${VERSION}_amd64.AppImage.sig"
          )

          missing=0
          for asset in "${expected_assets[@]}"; do
            if ! grep -qxF "$asset" assets.txt; then
              echo "::error::Missing release asset: $asset"
              missing=1
            fi
          done

          exit "$missing"

      - name: Verify updater metadata
        id: updater_metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version-metadata.outputs.tag }}
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir release-assets \
            --clobber

          jq -e --arg version "$VERSION" '.version == $version' release-assets/latest.json
          jq -e '.platforms | type == "object" and length > 0' release-assets/latest.json
          UPDATER_PLATFORM_COUNT=$(jq '.platforms | length' release-assets/latest.json)
          echo "platform_count=$UPDATER_PLATFORM_COUNT" >> "$GITHUB_OUTPUT"

          jq -er '.platforms[]?.url' release-assets/latest.json | while IFS= read -r url; do
            case "$url" in
              "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"*)
                ;;
              *)
                echo "::error::Unexpected updater asset URL: $url"
                exit 1
                ;;
            esac
          done

      - name: Update Nix package hashes
        id: update_hashes
        env:
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          BIN_PACKAGE_FILE="nix/packages/binary.nix"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/app-v${VERSION}"

          get_hash() {
            local url="$1"
            local tmpfile
            tmpfile=$(mktemp)
            echo "Downloading: $url" >&2
            curl -fsSL --retry 5 --retry-delay 5 -o "$tmpfile" "$url"
            nix hash file --type sha256 --sri "$tmpfile"
            rm -f "$tmpfile"
          }

          X64_LINUX_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_Linux_x64.deb")
          ARM64_LINUX_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_Linux_ARM.deb")
          X64_DARWIN_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_macOS_x64.dmg")
          ARM64_DARWIN_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_macOS_ARM.dmg")

          sed -i "s/version ? \"[^\"]*\"/version ? \"$VERSION\"/" "$BIN_PACKAGE_FILE"

          awk -v x64_linux="$X64_LINUX_HASH" -v arm64_linux="$ARM64_LINUX_HASH" \
              -v x64_darwin="$X64_DARWIN_HASH" -v arm64_darwin="$ARM64_DARWIN_HASH" '
          {
            if ($0 ~ /"x86_64-linux"/) { platform = "x64_linux"; }
            else if ($0 ~ /"aarch64-linux"/) { platform = "arm64_linux"; }
            else if ($0 ~ /"x86_64-darwin"/) { platform = "x64_darwin"; }
            else if ($0 ~ /"aarch64-darwin"/) { platform = "arm64_darwin"; }

            if ($0 ~ /hash = "sha256-/) {
              if (platform == "x64_linux") { sub(/hash = "sha256-[^"]*"/, "hash = \"" x64_linux "\""); platform = ""; }
              else if (platform == "arm64_linux") { sub(/hash = "sha256-[^"]*"/, "hash = \"" arm64_linux "\""); platform = ""; }
              else if (platform == "x64_darwin") { sub(/hash = "sha256-[^"]*"/, "hash = \"" x64_darwin "\""); platform = ""; }
              else if (platform == "arm64_darwin") { sub(/hash = "sha256-[^"]*"/, "hash = \"" arm64_darwin "\""); platform = ""; }
            }
            print;
          }' "$BIN_PACKAGE_FILE" > "$BIN_PACKAGE_FILE.tmp" && mv "$BIN_PACKAGE_FILE.tmp" "$BIN_PACKAGE_FILE"

          chmod +x ./scripts/update-hashes.sh
          ./scripts/update-hashes.sh

          if git diff --quiet -- nix/packages/binary.nix nix/packages/source.nix; then
            echo "hash_status=unchanged" >> "$GITHUB_OUTPUT"
          else
            echo "hash_status=updated" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify updated Nix source package
        run: nix build .#source --print-build-logs

      - name: Update README links
        env:
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          sed -i -E "s|app-v[0-9]+\.[0-9]+\.[0-9]+|app-v${VERSION}|g" README.md
          sed -i -E "s|[Cc]hiri_[0-9]+\.[0-9]+\.[0-9]+|Chiri_${VERSION}|g" README.md

      - name: Commit and push changes
        id: commit_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md nix/packages/binary.nix nix/packages/source.nix

          if git diff --staged --quiet; then
            echo "No post-release changes to commit"
            echo "commit_status=no changes" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: finalize post-release updates for v${VERSION}"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master
            echo "commit_status=pushed" >> "$GITHUB_OUTPUT"
          fi

      - name: Write post-release summary
        if: always()
        env:
          TAG: ${{ needs.version-metadata.outputs.tag }}
          VERSION: ${{ needs.version-metadata.outputs.version }}
          RELEASE_URL: ${{ steps.release_assets.outputs.release_url }}
          ASSET_COUNT: ${{ steps.release_assets.outputs.asset_count }}
          UPDATER_PLATFORM_COUNT: ${{ steps.updater_metadata.outputs.platform_count }}
          HASH_STATUS: ${{ steps.update_hashes.outputs.hash_status }}
          COMMIT_STATUS: ${{ steps.commit_changes.outputs.commit_status }}
          ASSET_RESULT: ${{ steps.release_assets.outcome }}
          UPDATER_RESULT: ${{ steps.updater_metadata.outcome }}
          HASH_RESULT: ${{ steps.update_hashes.outcome }}
        run: |
          set -euo pipefail

          {
            echo "## Post-release"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`$VERSION\` |"
            echo "| Release | [$TAG](${RELEASE_URL:-unavailable}) |"
            echo "| Asset count | ${ASSET_COUNT:-unavailable} |"
            echo "| Updater platform count | ${UPDATER_PLATFORM_COUNT:-unavailable} |"
            echo "| Hash update status | ${HASH_STATUS:-unavailable} |"
            echo "| Commit status | ${COMMIT_STATUS:-not reached} |"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Release assets | ${ASSET_RESULT:-not reached} |"
            echo "| Updater metadata | ${UPDATER_RESULT:-not reached} |"
            echo "| Hash update | ${HASH_RESULT:-not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
