name: Test Chiri app identity

on:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.CHIRI_CI_CLIENT_ID }}
          private-key: ${{ secrets.CHIRI_CI_PRIVATE_KEY }}
          permission-contents: write

      - name: Show bot identity
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          name="${APP_SLUG}[bot]"
          endpoint="/users/$name"
          user_id="$(gh api "$endpoint" --jq '.id')"
          echo "bot login: $name"
          echo "bot user id: $user_id"
          echo "bot email: ${user_id}+${name}@users.noreply.github.com"
