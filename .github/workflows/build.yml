name: 'Build'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            label: 'macOS (Apple Silicon)'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15-intel'
            label: 'macOS (Intel)'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            label: 'Ubuntu'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            label: 'Ubuntu (ARM)'
            args: ''
          - platform: 'windows-latest'
            label: 'Windows'
            args: ''
          - platform: 'windows-11-arm'
            label: 'Windows (ARM)'
            args: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies [Ubuntu]
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup2.4-dev libssl-dev libgtk-3-dev libjavascriptcoregtk-4.0-dev xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
