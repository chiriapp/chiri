name: 'Build'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'public/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/build.yml'
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'public/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/build.yml'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            label: 'macOS (Apple Silicon)'
            artifact: 'macos-apple-silicon'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15-intel'
            label: 'macOS (Intel)'
            artifact: 'macos-intel'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            label: 'Ubuntu'
            artifact: 'linux-ubuntu'
            rpm_artifact: 'linux-fedora'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            label: 'Ubuntu (ARM)'
            artifact: 'linux-ubuntu-arm'
            rpm_artifact: 'linux-fedora-arm'
            args: ''
          - platform: 'windows-latest'
            label: 'Windows'
            artifact: 'windows'
            args: ''
          - platform: 'windows-11-arm'
            label: 'Windows (ARM)'
            artifact: 'windows-arm'
            args: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies [Ubuntu]
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: Chiri-${{ matrix.artifact }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload Ubuntu artifacts
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: Chiri-${{ matrix.artifact }}
          path: |
            src-tauri/target/**/release/bundle/**/*.deb
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload Fedora artifacts
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: Chiri-${{ matrix.rpm_artifact }}
          path: |
            src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload Windows artifacts
        if: startsWith(matrix.platform, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: Chiri-${{ matrix.artifact }}
          path: |
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
