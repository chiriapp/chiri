name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

# ensure only one release workflow runs at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # first job: generate changelog and create the release
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Get previous tag
        id: get_prev_tag
        run: |
          # Get the most recent tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $PREV_TAG"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.get_prev_tag.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD)
          fi

          # Categorize commits by conventional commit type
          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS= read -r line; do
            if [[ "$line" == *"feat:"* ]] || [[ "$line" == *"feat("* ]]; then
              FEATURES="${FEATURES}${line}"$'\n'
            elif [[ "$line" == *"fix:"* ]] || [[ "$line" == *"fix("* ]]; then
              FIXES="${FIXES}${line}"$'\n'
            elif [[ -n "$line" ]]; then
              OTHERS="${OTHERS}${line}"$'\n'
            fi
          done <<< "$COMMITS"

          # Build changelog with proper newlines
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## ✨ Features"$'\n\n'"${FEATURES}"$'\n'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes"$'\n\n'"${FIXES}"$'\n'
          fi

          if [ -n "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}## 📝 Other Changes"$'\n\n'"${OTHERS}"$'\n'
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No notable changes in this release."
          fi

          # Add download instructions with platform-specific links
          REPO="${{ github.repository }}"
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v${VERSION}"

          CHANGELOG="${CHANGELOG}---"$'\n\n'"## 📥 Downloads"$'\n\n'
          CHANGELOG="${CHANGELOG}### Windows"$'\n'
          CHANGELOG="${CHANGELOG}- [Installer (.msi)](https://github.com/${REPO}/releases/download/${TAG}/chiri-${VERSION}-windows-x64.msi)"$'\n\n'
          CHANGELOG="${CHANGELOG}### macOS"$'\n'
          CHANGELOG="${CHANGELOG}- [Apple Silicon (M1/M2/M3)](https://github.com/${REPO}/releases/download/${TAG}/chiri-${VERSION}-macos-aarch64.dmg)"$'\n'
          CHANGELOG="${CHANGELOG}- [Intel](https://github.com/${REPO}/releases/download/${TAG}/chiri-${VERSION}-macos-x64.dmg)"$'\n\n'
          CHANGELOG="${CHANGELOG}### Linux"$'\n'
          CHANGELOG="${CHANGELOG}- [Debian/Ubuntu (.deb)](https://github.com/${REPO}/releases/download/${TAG}/chiri-${VERSION}-linux-amd64.deb)"$'\n'
          CHANGELOG="${CHANGELOG}- [Fedora/RHEL (.rpm)](https://github.com/${REPO}/releases/download/${TAG}/chiri-${VERSION}-linux-x64.rpm)"$'\n\n'
          CHANGELOG="${CHANGELOG}*See the assets below for additional formats and architectures.*"

          # Use heredoc syntax for multiline output
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: app-v${{ steps.get_version.outputs.version }}
          release_name: Chiri v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: true
          prerelease: false

  # second job: Build and upload artifacts for each platform
  publish-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15-intel'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'windows-11-arm'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup2.4-dev libssl-dev libgtk-3-dev libjavascriptcoregtk-4.0-dev xdg-utils

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Load signing secrets from 1Password
        if: matrix.platform != 'windows-11-arm'
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: op://Tauri/Tauri Secrets/signing-key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: op://Tauri/Tauri Secrets/signing-key-password
          APPLE_SIGNING_IDENTITY: op://Tauri/Apple Secrets/identity
          APPLE_CERTIFICATE: op://Tauri/Apple Secrets/certificate
          APPLE_CERTIFICATE_PASSWORD: op://Tauri/Apple Secrets/api-key
          APPLE_API_ISSUER: op://Tauri/Apple Secrets/api-issuer
          APPLE_API_KEY: op://Tauri/Apple Secrets/api-key
          APPLE_API_KEY_CERTIFICATE: op://Tauri/Apple Secrets/api-key-certificate

      - name: Load signing secrets from 1Password (Windows ARM)
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          # Install 1Password CLI manually for Windows ARM (not officially supported)
          $opUrl = "https://cache.agilebits.com/dist/1P/op2/pkg/v2.33.1/op_windows_amd64_v2.33.1.zip"
          Invoke-WebRequest -Uri $opUrl -OutFile "$env:RUNNER_TEMP\op.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\op.zip" -DestinationPath "$env:RUNNER_TEMP\op"
          $env:PATH = "$env:RUNNER_TEMP\op;$env:PATH"

          # Load secrets
          $signingKey = op read "op://Tauri/Tauri Secrets/signing-key"
          $signingKeyPassword = op read "op://Tauri/Tauri Secrets/signing-key-password"

          # Export to GitHub environment
          "TAURI_SIGNING_PRIVATE_KEY=$signingKey" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$signingKeyPassword" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-15-intel'
        shell: bash
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Extract signing identity from certificate
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID" | head -1 | awk -F'"' '{print $2}')
          echo "Found signing identity: $CERT_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Prepare Apple API key file
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-15-intel'
        shell: bash
        run: |
          APPLE_KEY_FILE="$RUNNER_TEMP/apple_api_key.p8"
          printf '%s' "$APPLE_API_KEY_CERTIFICATE" > "$APPLE_KEY_FILE"
          chmod 600 "$APPLE_KEY_FILE"
          echo "APPLE_API_KEY_PATH=$APPLE_KEY_FILE" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          # use existing release created by prepare-release job
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # third job: Update README with new version
  update-readme:
    needs: [prepare-release, publish-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Update README version links
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"

          # Update all download links in README.md
          sed -i "s|app-v[0-9]*\.[0-9]*\.[0-9]*|app-v${VERSION}|g" README.md
          sed -i "s|chiri_[0-9]*\.[0-9]*\.[0-9]*|chiri_${VERSION}|g" README.md
          sed -i "s|chiri-[0-9]*\.[0-9]*\.[0-9]*|chiri-${VERSION}|g" README.md

      - name: Commit and push README changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update README download links to v${{ needs.prepare-release.outputs.version }}"
            git push
          fi
