name: 'Integration'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/test-integration-all.sh'
      - 'src/lib/auth/**'
      - 'src/lib/caldav/**'
      - 'src/lib/ical/**'
      - 'src/lib/push/**'
      - 'src/lib/store/**'
      - 'src/tests/integration/**'
      - 'vitest.config.ts'
      - '.github/actions/setup-nix-cachix/**'
      - '.github/workflows/integration.yml'
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/test-integration-all.sh'
      - 'src/lib/auth/**'
      - 'src/lib/caldav/**'
      - 'src/lib/ical/**'
      - 'src/lib/push/**'
      - 'src/lib/store/**'
      - 'src/tests/integration/**'
      - 'vitest.config.ts'
      - '.github/actions/setup-nix-cachix/**'
      - '.github/workflows/integration.yml'

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: CalDAV
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Nix and Cachix
        uses: ./.github/actions/setup-nix-cachix
        with:
          cache-name: ${{ vars.CACHIX_CACHE_NAME || 'chiri' }}
          auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: ${{ secrets.CACHIX_AUTH_TOKEN == '' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}

      - name: Install Node dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Run CalDAV integration tests
        run: nix develop -c pnpm test:integration:all
