name: 'CalDAV integration'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/test-integration-all.sh'
      - 'src/lib/auth/**'
      - 'src/lib/caldav/**'
      - 'src/lib/ical/**'
      - 'src/lib/push/**'
      - 'src/lib/store/**'
      - 'src/tests/integration/**'
      - 'vitest.config.ts'
      - '.github/workflows/integration.yml'
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/test-integration-all.sh'
      - 'src/lib/auth/**'
      - 'src/lib/caldav/**'
      - 'src/lib/ical/**'
      - 'src/lib/push/**'
      - 'src/lib/store/**'
      - 'src/tests/integration/**'
      - 'vitest.config.ts'
      - '.github/workflows/integration.yml'

permissions:
  contents: read

concurrency:
  group: caldav-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Install Node dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Run CalDAV integration tests
        run: nix develop -c pnpm test:integration:all
